name: diary
description: A diary app with Firebase login, weather, speech-to-text, and notifications.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.30.0
  firebase_auth: ^4.19.4
  firebase_messaging: ^14.9.4
  local_auth: ^2.1.7
  shared_preferences: ^2.2.2
  speech_to_text: ^6.6.0
  permission_handler: ^11.3.1
  intl: ^0.19.0
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/diary.png
