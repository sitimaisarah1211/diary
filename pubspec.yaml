name: diary_app
description: A diary app with Firebase, Firestore, speech-to-text, and mood GIFs.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  firebase_core: 4.11.0
  firebase_auth: 6.5.4
  cloud_firestore: 6.6.0
  firebase_messaging: 16.4.1

  local_auth: ^2.1.7
  shared_preferences: ^2.2.2
  speech_to_text: 7.4.0
  permission_handler: ^11.3.1
  intl: ^0.19.0
  http: ^1.2.1
  geolocator: ^10.1.0
  flutter_slidable: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/